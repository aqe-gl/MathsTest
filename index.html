<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maths Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Press the button to answer a question</p>
    <button class="add">Adding</button>
    <button class="sub">Subtracting</button>
    <button class="mul">Multiplying</button>
    <button class="div">Dividing</button>

    <p>Select difficulty level</p>
    <select>
        <option value="easy">Easy 1-9</option>
        <option value="medium">Medium 10-99</option>
        <option value="hard">Hard 100-999</option>
    </select>

    <script src="script.js"></script>
</body>
</html>
